<script>
  // ── Tema claro/escuro ────────────────────────────────────────
  function aplicarTema(tema) {
    document.body.classList.toggle('light', tema === 'light');
    const moon = document.getElementById('theme-icon-moon');
    const sun  = document.getElementById('theme-icon-sun');
    if (moon) moon.style.display = tema === 'light' ? 'none' : '';
    if (sun)  sun.style.display  = tema === 'light' ? '' : 'none';
  }
  function toggleTheme() {
    const novo = document.body.classList.contains('light') ? 'dark' : 'light';
    localStorage.setItem('glr_tema', novo);
    aplicarTema(novo);
  }
  aplicarTema(localStorage.getItem('glr_tema') || 'dark');

  // ── Notificações push de vendas ──────────────────────────────
  function _atualizarIconePush() {
    const btn = document.getElementById('push-toggle');
    if (!btn) return;
    const ativo = typeof PushNotif !== 'undefined' && PushNotif.ativo();
    btn.style.color = ativo ? 'var(--green)' : '';
    btn.style.borderColor = ativo ? 'var(--green)' : '';
    btn.title = ativo ? 'Notificações de vendas ativas (clique pra desativar)' : 'Ativar notificações de vendas (push)';
  }
  async function _handlePushToggle() {
    if (typeof PushNotif === 'undefined') return;
    const btn = document.getElementById('push-toggle');
    if (btn) btn.disabled = true;
    await PushNotif.toggle();
    if (btn) btn.disabled = false;
    _atualizarIconePush();
  }
  setTimeout(_atualizarIconePush, 300);

  // ── Carrega todos os dados persistidos do localStorage ──────────
  function carregarDadosSalvos() {
    const mapa = {
      glr_clientes:  'clientes',
      glr_gestores:  'gestores',
      glr_acoes:     'acoes',
      glr_tarefas:   'tarefas',
      glr_alertas:   'alertas',
      glr_oportunidades: 'oportunidades',
    };
    Object.entries(mapa).forEach(([key, prop]) => {
      const raw = localStorage.getItem(key);
      if (raw) { try { GLR[prop] = JSON.parse(raw); } catch(e) {} }
    });
  }
  carregarDadosSalvos();

  // Atualiza badges dinamicamente
  function atualizarBadges() {
    const badgeOpp = document.getElementById('badge-opp');
    const badgeAlerta = document.getElementById('badge-alertas');
    const badgeTarefa = document.getElementById('badge-tarefas');

    const nOpp = GLR.oportunidades.length;
    const nAlerta = GLR.alertas.filter(a => !a.lido).length;
    const nTarefa = GLR.tarefas.filter(t => t.status === 'pendente' || t.status === 'atrasada').length;

    if (badgeOpp)    { badgeOpp.textContent = nOpp;    badgeOpp.style.display    = nOpp    ? '' : 'none'; }
    if (badgeAlerta) { badgeAlerta.textContent = nAlerta; badgeAlerta.style.display = nAlerta ? '' : 'none'; }
    if (badgeTarefa) { badgeTarefa.textContent = nTarefa; badgeTarefa.style.display = nTarefa ? '' : 'none'; }

    // Notif dot no header
    const dot = document.querySelector('.notif-dot');
    if (dot) dot.style.display = nAlerta > 0 ? '' : 'none';
  }
  atualizarBadges();
</script>

<script>
  // ---- App Init ----
  document.addEventListener('DOMContentLoaded', () => {
    Router.init();
    initSearch();
    handleResponsive();
    window.addEventListener('resize', handleResponsive);
  });

  // ---- Responsive ----
  function handleResponsive() {
    const toggle = document.getElementById('sidebar-toggle');
    if (window.innerWidth <= 900) {
      toggle.style.display = 'flex';
    } else {
      toggle.style.display = 'none';
      document.getElementById('sidebar').classList.remove('open');
    }
  }

  // ---- Global Search ----
  function initSearch() {
    document.addEventListener('click', e => {
      if (!e.target.closest('#search-overlay') && !e.target.closest('#global-search')) {
        document.getElementById('search-overlay').style.display = 'none';
      }
    });
  }

  function handleSearch(q) {
    const overlay = document.getElementById('search-overlay');
    const results = document.getElementById('search-results');
    if (!q.trim()) { overlay.style.display = 'none'; return; }

    const ql = q.toLowerCase();
    const clienteResults = GLR.clientes.filter(c =>
      c.nome.toLowerCase().includes(ql) ||
      c.responsavel.toLowerCase().includes(ql) ||
      c.categoria.toLowerCase().includes(ql)
    );
    const tarefaResults = GLR.tarefas.filter(t =>
      t.titulo.toLowerCase().includes(ql) ||
      t.cliente.toLowerCase().includes(ql)
    );

    if (!clienteResults.length && !tarefaResults.length) {
      results.innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">Nenhum resultado para "${q}"</div>`;
      overlay.style.display = 'block';
      return;
    }

    results.innerHTML = `
      ${clienteResults.length ? `
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Clientes</div>
        ${clienteResults.map(c => `
          <div onclick="Router.navigate('cliente-perfil',{id:${c.id}});document.getElementById('search-overlay').style.display='none';document.getElementById('global-search').value='';"
               style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;"
               onmouseover="this.style.background='var(--bg-card)'" onmouseout="this.style.background='transparent'">
            <div style="width:28px;height:28px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;">${c.nome.charAt(0)}</div>
            <div>
              <div style="font-size:13.5px;font-weight:600;">${c.nome}</div>
              <div style="font-size:11.5px;color:var(--text-muted);">${c.categoria} · ${c.gestor}</div>
            </div>
            <span class="badge ${GLR.statusColor[c.status]}" style="margin-left:auto;">${GLR.statusLabel[c.status]}</span>
          </div>
        `).join('')}
      ` : ''}
      ${tarefaResults.length ? `
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 8px;">Tarefas</div>
        ${tarefaResults.slice(0,4).map(t => `
          <div onclick="Router.navigate('tarefas');document.getElementById('search-overlay').style.display='none';document.getElementById('global-search').value='';"
               style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;"
               onmouseover="this.style.background='var(--bg-card)'" onmouseout="this.style.background='transparent'">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--text-muted);flex-shrink:0;"><path d="M9 11l3 3L22 4"/></svg>
            <div style="flex:1;">
              <div style="font-size:13.5px;font-weight:500;">${t.titulo}</div>
              <div style="font-size:11.5px;color:var(--text-muted);">${t.cliente} · ${formatDate(t.prazo)}</div>
            </div>
            <span class="badge ${GLR.prioridadeColor[t.prioridade]}">${t.prioridade}</span>
          </div>
        `).join('')}
      ` : ''}
    `;
    overlay.style.display = 'block';
  }
</script>
</body>
</html>
